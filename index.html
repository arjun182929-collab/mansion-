<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return originalFetch;
            },
            set: function(val) {
              originalFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("window.fetch safety setter init error:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
